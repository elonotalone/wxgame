<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>My WxGame — Preview</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1f2937;
        color: #e5e7eb;
        overflow: hidden;
      }
      #stage {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
      }
      .device-frame {
        position: relative;
        background: #000;
        border-radius: 36px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4), 0 0 0 8px #111827;
        overflow: hidden;
      }
      .device-frame canvas {
        display: block;
      }
      .hint {
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
        max-width: 360px;
      }
      .hint code {
        background: #111827;
        border: 1px solid #334155;
        padding: 1px 4px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div class="device-frame">
        <canvas id="game-canvas" width="360" height="640"></canvas>
      </div>
      <div class="hint">
        Browser preview · wx.* shimmed · 改 <code>src/game-logic.js</code> 即热更新
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
